<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cicada Shed</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #0c1a12;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #eaf6e8;
    text-align: center;
    padding: 20px;
    pointer-events: none;
  }
  #overlay.active { pointer-events: auto; background: rgba(5, 15, 8, 0.78); }
  #overlay h1 {
    font-size: clamp(26px, 7.5vw, 52px);
    margin: 0 0 6px 0;
    letter-spacing: 2px;
    color: #b7f0a0;
    text-shadow: 0 0 18px rgba(150,255,120,0.5);
  }
  #overlay p.sub {
    margin: 0 0 20px 0;
    font-size: clamp(12px, 3vw, 15px);
    color: #a9d9a0;
    max-width: 460px;
    line-height: 1.5;
  }
  .cicada-picker {
    display: flex;
    gap: clamp(10px, 3vw, 20px);
    flex-wrap: wrap;
    justify-content: center;
    max-width: 500px;
    margin-bottom: 24px;
  }
  .cicada-option {
    width: clamp(50px, 13vw, 74px);
    height: clamp(50px, 13vw, 74px);
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, border-color 0.15s;
    background: radial-gradient(circle at 35% 30%, var(--c2), var(--c1));
  }
  .cicada-option:active { transform: scale(0.92); }
  .cicada-option.selected {
    border-color: #fff9d1;
    transform: scale(1.12);
    box-shadow: 0 0 20px rgba(255,249,209,0.6);
  }
  button.game-btn {
    font-family: 'Courier New', monospace;
    font-size: clamp(15px, 4vw, 19px);
    font-weight: bold;
    letter-spacing: 1px;
    padding: 13px 34px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(180deg, #8fe06a, #4f9e3a);
    color: #0c1a12;
    box-shadow: 0 4px 0 #2f6b23, 0 6px 14px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.08s;
  }
  button.game-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #2f6b23; }
  button.game-btn:disabled { opacity: 0.35; box-shadow: none; cursor: default; }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: max(10px, env(safe-area-inset-top)) 14px 0 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }
  #hearts { display: flex; gap: 4px; font-size: clamp(20px, 5vw, 26px); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6)); }
  #growthWrap {
    flex: 1;
    max-width: 230px;
    margin-left: 14px;
    background: rgba(0,0,0,0.35);
    border-radius: 12px;
    padding: 4px 8px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #growthLabel { font-size: 10px; color: #cdeec3; letter-spacing: 1px; margin-bottom: 2px; display:flex; justify-content:space-between; }
  #growthBar { height: 10px; border-radius: 6px; background: rgba(255,255,255,0.12); overflow: hidden; }
  #growthFill { height: 100%; width: 0%; background: linear-gradient(90deg, #7ee85a, #d7f542); transition: width 0.2s; }
  #zoneLabel {
    position: absolute;
    top: max(56px, calc(env(safe-area-inset-top) + 46px));
    left: 14px;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud" style="display:none;">
    <div id="hearts"></div>
    <div id="growthWrap">
      <div id="growthLabel"><span>GROWTH</span><span id="growthPct">0%</span></div>
      <div id="growthBar"><div id="growthFill"></div></div>
    </div>
  </div>
  <div id="zoneLabel"></div>
  <div id="overlay" class="active">
    <h1>Cicada Shed</h1>
    <p class="sub">Choose your cicada. Roam the garden, eat leaves to grow, and dodge the frogs that hunt you. Survive long enough to molt into an adult — but three hits and it's over.</p>
    <div class="cicada-picker" id="picker"></div>
    <button class="game-btn" id="startBtn" disabled>Start</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  let picker = document.getElementById('picker');
  const startBtn = document.getElementById('startBtn');
  const hud = document.getElementById('hud');
  const heartsEl = document.getElementById('hearts');
  const growthFill = document.getElementById('growthFill');
  const growthPct = document.getElementById('growthPct');
  const zoneLabel = document.getElementById('zoneLabel');

  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  resize();

  // ---------- World ----------
  const WORLD_W = 3600;
  const WORLD_H = 2000;
  const HORIZON = WORLD_H * 0.42;

  const ZONES = [
    { name: 'Dawn Meadow',      x0: 0,          x1: WORLD_W*0.25, sky: '#dff2ff', ground: '#5fae46', deco: 'meadow' },
    { name: 'Pond Edge',        x0: WORLD_W*0.25, x1: WORLD_W*0.5,  sky: '#cdeaf5', ground: '#2f8f7d', deco: 'pond' },
    { name: 'Tall Grass',       x0: WORLD_W*0.5,  x1: WORLD_W*0.75, sky: '#a9d6c8', ground: '#2c6b34', deco: 'grass' },
    { name: 'Golden Grove',     x0: WORLD_W*0.75, x1: WORLD_W,      sky: '#ffe9b0', ground: '#6b5a2f', deco: 'grove' }
  ];

  function zoneAt(x){
    for (const z of ZONES) if (x >= z.x0 && x < z.x1) return z;
    return ZONES[ZONES.length-1];
  }

  let bgCanvas, bgCtx;
  function buildBackground(){
    bgCanvas = document.createElement('canvas');
    bgCanvas.width = WORLD_W;
    bgCanvas.height = WORLD_H;
    bgCtx = bgCanvas.getContext('2d');

    // sky (horizontal blended gradient across zones)
    const skyGrad = bgCtx.createLinearGradient(0,0,WORLD_W,0);
    ZONES.forEach((z,i) => {
      const f0 = z.x0/WORLD_W, f1 = z.x1/WORLD_W;
      skyGrad.addColorStop(f0, z.sky);
      skyGrad.addColorStop(Math.min(0.999,f1), z.sky);
    });
    bgCtx.fillStyle = skyGrad;
    bgCtx.fillRect(0,0,WORLD_W,HORIZON);

    // soft sun glow
    bgCtx.beginPath();
    bgCtx.arc(WORLD_W*0.12, HORIZON*0.3, 70, 0, Math.PI*2);
    bgCtx.fillStyle = 'rgba(255,250,215,0.8)';
    bgCtx.fill();

    // ground (horizontal blended gradient)
    const groundGrad = bgCtx.createLinearGradient(0,0,WORLD_W,0);
    ZONES.forEach((z) => {
      const f0 = z.x0/WORLD_W, f1 = z.x1/WORLD_W;
      groundGrad.addColorStop(f0, z.ground);
      groundGrad.addColorStop(Math.min(0.999,f1), z.ground);
    });
    bgCtx.fillStyle = groundGrad;
    bgCtx.fillRect(0,HORIZON,WORLD_W,WORLD_H-HORIZON);

    // rolling hill line at horizon
    bgCtx.fillStyle = 'rgba(255,255,255,0.12)';
    bgCtx.beginPath();
    bgCtx.moveTo(0,HORIZON);
    for (let x=0;x<=WORLD_W;x+=60){
      bgCtx.lineTo(x, HORIZON - 10*Math.sin(x*0.008));
    }
    bgCtx.lineTo(WORLD_W,HORIZON+40); bgCtx.lineTo(0,HORIZON+40); bgCtx.closePath();
    bgCtx.fill();

    function rnd(a,b){ return a+Math.random()*(b-a); }

    ZONES.forEach(z => {
      const decoCount = 55;
      for (let i=0;i<decoCount;i++){
        const x = rnd(z.x0+20, z.x1-20);
        const y = rnd(HORIZON+20, WORLD_H-30);
        if (z.deco === 'meadow'){
          // small flowers & tufts
          bgCtx.fillStyle = ['#ffffff','#ffd977','#ff9ecf'][Math.floor(rnd(0,3))];
          bgCtx.beginPath();
          bgCtx.arc(x,y,rnd(3,6),0,Math.PI*2);
          bgCtx.fill();
          bgCtx.fillStyle = '#3f8a2e';
          bgCtx.fillRect(x-1,y,2,rnd(8,16));
        } else if (z.deco === 'pond'){
          if (Math.random() < 0.3){
            bgCtx.fillStyle = 'rgba(60,140,120,0.5)';
            bgCtx.beginPath();
            bgCtx.ellipse(x,y,rnd(20,40),rnd(8,14),0,0,Math.PI*2);
            bgCtx.fill();
          } else {
            bgCtx.strokeStyle = '#1f6b55';
            bgCtx.lineWidth = 3;
            bgCtx.beginPath();
            bgCtx.moveTo(x,y+rnd(10,20));
            bgCtx.quadraticCurveTo(x+rnd(-8,8),y-rnd(10,20),x+rnd(-4,4),y-rnd(20,35));
            bgCtx.stroke();
          }
        } else if (z.deco === 'grass'){
          bgCtx.strokeStyle = '#1e5424';
          bgCtx.lineWidth = 3;
          const h = rnd(20,45);
          bgCtx.beginPath();
          bgCtx.moveTo(x,y);
          bgCtx.quadraticCurveTo(x+rnd(-10,10),y-h*0.6,x+rnd(-6,6),y-h);
          bgCtx.stroke();
        } else if (z.deco === 'grove'){
          if (Math.random() < 0.15){
            bgCtx.fillStyle = '#5a4326';
            bgCtx.fillRect(x-6,y-70,12,90);
            bgCtx.fillStyle = 'rgba(255,220,140,0.35)';
            bgCtx.beginPath();
            bgCtx.arc(x, y-90, 45, 0, Math.PI*2);
            bgCtx.fill();
          } else {
            bgCtx.fillStyle = ['#e0895a','#f2c14e'][Math.floor(rnd(0,2))];
            bgCtx.beginPath();
            bgCtx.ellipse(x,y,rnd(5,8),rnd(6,9),0,0,Math.PI*2);
            bgCtx.fill();
          }
        }
      }
    });

    // zone divider soft glow lines
    bgCtx.strokeStyle = 'rgba(255,255,255,0.15)';
    bgCtx.lineWidth = 2;
    [0.25,0.5,0.75].forEach(f => {
      bgCtx.beginPath();
      bgCtx.moveTo(WORLD_W*f,0);
      bgCtx.lineTo(WORLD_W*f,WORLD_H);
      bgCtx.stroke();
    });
  }

  // ---------- Cicada choices ----------
  const CICADA_TYPES = [
    { name: 'Emerald', c1: '#1e5e2a', c2: '#7be06a' },
    { name: 'Ruby',    c1: '#6e1420', c2: '#ff6b6b' },
    { name: 'Sapphire',c1: '#123a6e', c2: '#6bb7ff' },
    { name: 'Amber',   c1: '#7a4a00', c2: '#ffcc55' },
    { name: 'Violet',  c1: '#4a1866', c2: '#c98bff' }
  ];
  let selectedType = null;

  function buildPicker(container){
    container.innerHTML = '';
    CICADA_TYPES.forEach((t) => {
      const div = document.createElement('div');
      div.className = 'cicada-option';
      div.style.setProperty('--c1', t.c1);
      div.style.setProperty('--c2', t.c2);
      div.title = t.name;
      if (t === selectedType) div.classList.add('selected');
      div.addEventListener('pointerdown', () => {
        document.querySelectorAll('.cicada-option').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
        selectedType = t;
        startBtn.disabled = false;
      });
      container.appendChild(div);
    });
  }
  buildPicker(picker);

  // ---------- Game state ----------
  const STATE = { MENU: 'menu', PLAYING: 'playing', SHEDDING: 'shedding', WIN: 'win', OVER: 'over' };
  let state = STATE.MENU;

  let player, leaves, frogs, particles, hearts, growth, invincibleT, spawnTimer, elapsed;
  let camera = { x: 0, y: 0 };
  const GROWTH_GOAL = 100;
  const MAX_LEAVES = 11;

  function rand(a,b){ return a + Math.random()*(b-a); }
  function dist(x1,y1,x2,y2){ return Math.hypot(x1-x2, y1-y2); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  function resetGame(){
    player = {
      x: WORLD_W*0.15, y: WORLD_H*0.65,
      r: 20, vx: 0, vy: 0,
      color1: selectedType.c1, color2: selectedType.c2,
      wingPhase: 0, facing: 1
    };
    leaves = [];
    frogs = [];
    particles = [];
    hearts = 3;
    growth = 0;
    invincibleT = 0;
    spawnTimer = 2.6;
    elapsed = 0;
    for (let i=0;i<MAX_LEAVES;i++) spawnLeaf();
    renderHearts();
    growthFill.style.width = '0%';
    growthPct.textContent = '0%';
    updateCamera();
  }

  function renderHearts(){
    heartsEl.innerHTML = '';
    for (let i=0;i<3;i++){
      const span = document.createElement('span');
      span.textContent = i < hearts ? '❤️' : '🖤';
      heartsEl.appendChild(span);
    }
  }

  function spawnLeaf(){
    let x,y,tries=0;
    do {
      const angle = rand(0,Math.PI*2);
      const radius = rand(120,420);
      x = clamp(player.x + Math.cos(angle)*radius, 40, WORLD_W-40);
      y = clamp(player.y + Math.sin(angle)*radius, HORIZON+30, WORLD_H-30);
      tries++;
    } while (dist(x,y,player.x,player.y) < 90 && tries < 15);
    leaves.push({ x, y, r: rand(9,13), sway: Math.random()*Math.PI*2, taken:false });
  }

  function spawnFrog(){
    // spawn just outside the current camera view, in world space
    const margin = 60;
    const side = Math.floor(rand(0,4));
    let x,y;
    if (side===0){ x = rand(camera.x, camera.x+W); y = camera.y - margin; }
    else if (side===1){ x = camera.x + W + margin; y = rand(camera.y, camera.y+H); }
    else if (side===2){ x = rand(camera.x, camera.x+W); y = camera.y + H + margin; }
    else { x = camera.x - margin; y = rand(camera.y, camera.y+H); }
    x = clamp(x, 0, WORLD_W);
    y = clamp(y, HORIZON+10, WORLD_H-10);

    const isHopper = elapsed > 18 && Math.random() < 0.4;
    const speed = rand(60,90) + Math.min(elapsed*1.3, 70);
    frogs.push({
      x, y, r: rand(16,20), speed,
      hopPhase: Math.random()*Math.PI*2,
      type: isHopper ? 'hopper' : 'chaser',
      burstT: 0
    });
  }

  function updateCamera(){
    camera.x = clamp(player.x - W/2, 0, Math.max(0, WORLD_W - W));
    camera.y = clamp(player.y - H*0.55, 0, Math.max(0, WORLD_H - H));
  }

  // ---------- Controls ----------
  let pointerActive = false;
  let pointerX = 0, pointerY = 0;
  const keys = { up:false, down:false, left:false, right:false };

  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) return;
    pointerActive = true;
    pointerX = e.clientX; pointerY = e.clientY;
  });
  canvas.addEventListener('pointermove', e => {
    if (!pointerActive) return;
    pointerX = e.clientX; pointerY = e.clientY;
  });
  window.addEventListener('pointerup', () => { pointerActive = false; });
  canvas.addEventListener('pointercancel', () => { pointerActive = false; });

  window.addEventListener('keydown', e => {
    if (['ArrowUp','w','W'].includes(e.key)) keys.up = true;
    if (['ArrowDown','s','S'].includes(e.key)) keys.down = true;
    if (['ArrowLeft','a','A'].includes(e.key)) keys.left = true;
    if (['ArrowRight','d','D'].includes(e.key)) keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (['ArrowUp','w','W'].includes(e.key)) keys.up = false;
    if (['ArrowDown','s','S'].includes(e.key)) keys.down = false;
    if (['ArrowLeft','a','A'].includes(e.key)) keys.left = false;
    if (['ArrowRight','d','D'].includes(e.key)) keys.right = false;
  });

  function beginGame(){
    resetGame();
    state = STATE.PLAYING;
    overlay.classList.remove('active');
    overlay.style.display = 'none';
    hud.style.display = 'flex';
    zoneLabel.style.display = 'block';
    lastT = performance.now();
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', () => {
    if (!selectedType) return;
    if (!bgCanvas) buildBackground();
    beginGame();
  });

  function showMenuOverlay(title, sub, buttonLabel, onStart){
    overlay.innerHTML = '';
    overlay.style.display = 'flex';
    overlay.classList.add('active');
    const h1 = document.createElement('h1');
    h1.textContent = title;
    const p = document.createElement('p');
    p.className = 'sub';
    p.textContent = sub;
    overlay.appendChild(h1);
    overlay.appendChild(p);
    const pickerDiv = document.createElement('div');
    pickerDiv.className = 'cicada-picker';
    overlay.appendChild(pickerDiv);
    buildPicker(pickerDiv);
    const btn = document.createElement('button');
    btn.className = 'game-btn';
    btn.textContent = buttonLabel;
    btn.disabled = !selectedType;
    btn.addEventListener('click', onStart);
    overlay.appendChild(btn);
    picker = pickerDiv;
    hud.style.display = 'none';
    zoneLabel.style.display = 'none';
  }

  function gameOver(){
    state = STATE.OVER;
    showMenuOverlay('Game Over', 'A frog got you three times before you could finish growing. Pick a cicada and try again.', 'Try Again', beginGame);
  }

  function winGame(){
    state = STATE.WIN;
    showMenuOverlay('You Shed Your Skin!', 'Your cicada grew to full size and molted into an adult, wings and all. You survived the garden. Play again?', 'Play Again', beginGame);
  }

  // ---------- Shedding sequence ----------
  let shedT = 0;
  const SHED_SETTLE = 0.8;
  const SHED_CRACK = 1.6;
  const SHED_EMERGE = 2.2;
  const SHED_UNFURL = 1.6;
  const SHED_FLY = 1.8;
  const SHED_TOTAL = SHED_SETTLE + SHED_CRACK + SHED_EMERGE + SHED_UNFURL + SHED_FLY;

  function startShedding(){
    state = STATE.SHEDDING;
    shedT = 0;
    frogs = [];
    particles = [];
  }

  function spawnSparkle(x,y){
    particles.push({
      x, y,
      vx: rand(-30,30), vy: rand(-60,-20),
      life: rand(0.6,1.2), age: 0,
      size: rand(2,4),
      color: Math.random() < 0.5 ? '#fff6c9' : '#c9ffdc'
    });
  }

  function updateShedding(dt){
    shedT += dt;
    // gentle particle emission during crack/emerge/unfurl
    if (shedT > SHED_SETTLE && shedT < SHED_SETTLE+SHED_CRACK+SHED_EMERGE+SHED_UNFURL){
      if (Math.random() < 0.4) spawnSparkle(player.x + rand(-24,24), player.y + rand(-24,24));
    }
    for (const p of particles){
      p.age += dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;
      p.vy += 40*dt;
    }
    particles = particles.filter(p => p.age < p.life);
    updateCamera();
    if (shedT >= SHED_TOTAL){
      winGame();
    }
  }

  // ---------- Update ----------
  let lastT = 0;

  function updatePlaying(dt){
    elapsed += dt;
    player.wingPhase += dt*10;

    let dx = 0, dy = 0;
    if (pointerActive){
      const worldPointerX = pointerX + camera.x;
      const worldPointerY = pointerY + camera.y;
      const tdx = worldPointerX - player.x;
      const tdy = worldPointerY - player.y;
      const d = Math.hypot(tdx,tdy);
      if (d > 4){ dx += tdx/d; dy += tdy/d; }
    }
    if (keys.up) dy -= 1;
    if (keys.down) dy += 1;
    if (keys.left) dx -= 1;
    if (keys.right) dx += 1;

    const mag = Math.hypot(dx,dy);
    const speed = 230;
    if (mag > 0){
      player.vx = (dx/mag) * speed;
      player.vy = (dy/mag) * speed;
      if (dx !== 0) player.facing = dx > 0 ? 1 : -1;
    } else {
      player.vx *= 0.8;
      player.vy *= 0.8;
    }
    player.x += player.vx * dt;
    player.y += player.vy * dt;
    player.x = clamp(player.x, player.r, WORLD_W - player.r);
    player.y = clamp(player.y, HORIZON + player.r + 10, WORLD_H - player.r);

    updateCamera();

    if (invincibleT > 0) invincibleT -= dt;

    for (const leaf of leaves){
      leaf.sway += dt*2;
      if (!leaf.taken && dist(player.x,player.y,leaf.x,leaf.y) < player.r + leaf.r){
        leaf.taken = true;
        growth = Math.min(GROWTH_GOAL, growth + rand(4,7));
        growthFill.style.width = (growth/GROWTH_GOAL*100) + '%';
        growthPct.textContent = Math.round(growth/GROWTH_GOAL*100) + '%';
        for (let i=0;i<5;i++) spawnSparkle(leaf.x,leaf.y);
      }
    }
    leaves = leaves.filter(l => !l.taken);
    while (leaves.length < MAX_LEAVES) spawnLeaf();

    spawnTimer -= dt;
    const spawnInterval = Math.max(0.9, 2.6 - elapsed*0.035);
    const maxFrogs = 5 + Math.floor(Math.min(elapsed/20, 3));
    if (spawnTimer <= 0 && frogs.length < maxFrogs){
      spawnFrog();
      spawnTimer = spawnInterval;
    }

    for (const frog of frogs){
      frog.hopPhase += dt*6;
      let mult = 1;
      if (frog.type === 'hopper'){
        frog.burstT -= dt;
        if (frog.burstT <= 0){
          frog.burstT = rand(1.0,1.8);
          frog.bursting = true;
          frog.burstDur = 0.35;
        }
        if (frog.bursting){
          frog.burstDur -= dt;
          mult = 2.2;
          if (frog.burstDur <= 0) frog.bursting = false;
        }
      }
      const tdx = player.x - frog.x;
      const tdy = player.y - frog.y;
      const d = Math.hypot(tdx,tdy) || 1;
      frog.x += (tdx/d) * frog.speed * mult * dt;
      frog.y += (tdy/d) * frog.speed * mult * dt;

      if (invincibleT <= 0 && dist(player.x,player.y,frog.x,frog.y) < player.r + frog.r - 6){
        hearts -= 1;
        renderHearts();
        invincibleT = 1.6;
        const angle = rand(0,Math.PI*2);
        frog.x = clamp(player.x + Math.cos(angle)*500, 0, WORLD_W);
        frog.y = clamp(player.y + Math.sin(angle)*500, HORIZON+10, WORLD_H-10);
        if (hearts <= 0){ gameOver(); return; }
      }
    }
    frogs = frogs.filter(f => dist(f.x,f.y,camera.x+W/2,camera.y+H/2) < Math.max(W,H)*1.4);

    const z = zoneAt(player.x);
    zoneLabel.textContent = z.name;

    if (growth >= GROWTH_GOAL){
      startShedding();
    }
  }

  function update(dt){
    if (state === STATE.PLAYING) updatePlaying(dt);
    else if (state === STATE.SHEDDING) updateShedding(dt);
  }

  // ---------- Draw ----------
  function drawWorld(){
    ctx.drawImage(bgCanvas, camera.x, camera.y, W, H, 0, 0, W, H);
  }

  function drawLeaf(l){
    const sx = l.x - camera.x, sy = l.y - camera.y;
    if (sx < -30 || sx > W+30 || sy < -30 || sy > H+30) return;
    ctx.save();
    ctx.translate(sx, sy + Math.sin(l.sway)*3);
    ctx.rotate(Math.sin(l.sway*0.5)*0.15);
    ctx.beginPath();
    ctx.moveTo(0,-l.r);
    ctx.quadraticCurveTo(l.r,0,0,l.r);
    ctx.quadraticCurveTo(-l.r,0,0,-l.r);
    ctx.fillStyle = '#4fbf3a';
    ctx.fill();
    ctx.strokeStyle = '#2c7a1f';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0,-l.r); ctx.lineTo(0,l.r);
    ctx.stroke();
    ctx.restore();
  }

  function drawFrog(f){
    const sx = f.x - camera.x, sy = f.y - camera.y;
    if (sx < -40 || sx > W+40 || sy < -40 || sy > H+40) return;
    const hop = Math.sin(f.hopPhase)*4;
    ctx.save();
    ctx.translate(sx, sy + hop*0.3);
    ctx.fillStyle = f.type==='hopper' ? '#2f7a55' : '#2f7a2f';
    ctx.beginPath();
    ctx.ellipse(-f.r*0.9,f.r*0.4,f.r*0.5,f.r*0.3,0.4,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(f.r*0.9,f.r*0.4,f.r*0.5,f.r*0.3,-0.4,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0,0,f.r,f.r*0.8,0,0,Math.PI*2);
    ctx.fillStyle = f.type==='hopper' ? '#5fcf6a' : '#4caf3f';
    ctx.fill();
    ctx.fillStyle = '#e8ffdc';
    ctx.beginPath();
    ctx.arc(-f.r*0.4,-f.r*0.55,f.r*0.28,0,Math.PI*2);
    ctx.arc(f.r*0.4,-f.r*0.55,f.r*0.28,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#123a12';
    ctx.beginPath();
    ctx.arc(-f.r*0.4,-f.r*0.55,f.r*0.13,0,Math.PI*2);
    ctx.arc(f.r*0.4,-f.r*0.55,f.r*0.13,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawCicadaShape(sx, sy, r, color1, color2, facing, wingPhase, wingScale, opacity){
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.translate(sx, sy);
    ctx.scale(facing, 1);
    const wingFlap = Math.sin(wingPhase)*0.25;

    ctx.save();
    ctx.rotate(-0.3 + wingFlap);
    ctx.scale(wingScale, wingScale);
    ctx.beginPath();
    ctx.ellipse(-r*0.2,-r*0.2,r*1.5,r*0.6,0,0,Math.PI*2);
    ctx.fillStyle = 'rgba(230,245,255,0.55)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(160,190,200,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.rotate(0.3 - wingFlap);
    ctx.scale(wingScale, wingScale);
    ctx.beginPath();
    ctx.ellipse(r*0.2,r*0.1,r*1.4,r*0.55,0,0,Math.PI*2);
    ctx.fillStyle = 'rgba(230,245,255,0.45)';
    ctx.fill();
    ctx.restore();

    const grad = ctx.createRadialGradient(-r*0.3,-r*0.3,2,0,0,r*1.2);
    grad.addColorStop(0,color2);
    grad.addColorStop(1,color1);
    ctx.beginPath();
    ctx.ellipse(0,0,r,r*0.75,0,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(r*0.45,-r*0.2,r*0.18,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(r*0.45,r*0.15,r*0.18,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer(){
    if (invincibleT > 0 && Math.floor(invincibleT*10)%2===0) return;
    const sx = player.x - camera.x, sy = player.y - camera.y;
    drawCicadaShape(sx, sy, player.r, player.color1, player.color2, player.facing, player.wingPhase, 1, 1);
  }

  function drawParticles(){
    for (const p of particles){
      const sx = p.x - camera.x, sy = p.y - camera.y;
      const a = 1 - p.age/p.life;
      ctx.globalAlpha = Math.max(0,a);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(sx, sy, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawShedding(){
    drawWorld();
    const sx = player.x - camera.x, sy = player.y - camera.y;
    let t = shedT;

    // phase boundaries
    const t0 = SHED_SETTLE;
    const t1 = t0 + SHED_CRACK;
    const t2 = t1 + SHED_EMERGE;
    const t3 = t2 + SHED_UNFURL;
    const t4 = t3 + SHED_FLY;

    // dull old shell (always drawn once cracking begins, fading during fly-away)
    let shellAlpha = 1;
    if (t > t3){
      shellAlpha = 1 - clamp((t-t3)/SHED_FLY, 0, 1);
    }
    if (t > 0 && t <= t4){
      ctx.save();
      ctx.globalAlpha = shellAlpha * 0.9;
      ctx.translate(sx, sy);
      ctx.scale(player.facing,1);
      ctx.beginPath();
      ctx.ellipse(0,0,player.r,player.r*0.75,0,0,Math.PI*2);
      ctx.fillStyle = '#8a7a5a';
      ctx.fill();
      ctx.strokeStyle = '#5c4f38';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    // crack lines growing during crack phase
    if (t > t0 && t <= t2){
      const crackProgress = clamp((t-t0)/SHED_CRACK, 0, 1);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const len = player.r*1.4*Math.min(1,crackProgress*1.4);
      ctx.moveTo(0,-len*0.6);
      ctx.lineTo(len*0.15,-len*0.1);
      ctx.lineTo(-len*0.1,len*0.15);
      ctx.lineTo(len*0.05,len*0.6);
      ctx.stroke();
      ctx.restore();
    }

    // emerging / unfurling adult
    if (t > t1){
      const emergeProgress = clamp((t-t1)/SHED_EMERGE, 0, 1);
      const unfurlProgress = clamp((t-t2)/SHED_UNFURL, 0, 1);
      const flyProgress = clamp((t-t3)/SHED_FLY, 0, 1);

      const liftY = -emergeProgress*18 - flyProgress*flyProgress*260;
      const scale = 0.6 + 0.4*emergeProgress;
      const wingScale = 0.3 + 0.7*unfurlProgress;
      const opacity = 1 - (flyProgress>0.85 ? (flyProgress-0.85)/0.15 : 0);

      ctx.save();
      ctx.translate(0, liftY);
      drawCicadaShape(sx, sy - 0 , player.r*scale, player.color1, player.color2, player.facing, player.wingPhase*3, wingScale, Math.max(0,opacity));
      ctx.restore();
    }

    drawParticles();
  }

  function draw(){
    if (state === STATE.SHEDDING){
      drawShedding();
      return;
    }
    drawWorld();
    for (const l of leaves) drawLeaf(l);
    for (const f of frogs) drawFrog(f);
    drawPlayer();
    drawParticles();
  }

  function loop(now){
    if (state !== STATE.PLAYING && state !== STATE.SHEDDING) return;
    const dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
