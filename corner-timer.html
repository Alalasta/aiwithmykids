<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Corner — Workout Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #111112;
    color: #F2EFE9;
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    overscroll-behavior: none;
  }
  .bebas { font-family: 'Bebas Neue', 'Oswald', sans-serif; }
  #app {
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  .header {
    width: 100%; max-width: 420px;
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .title { font-size: 28px; letter-spacing: 2px; }
  .subtitle { font-size: 12px; letter-spacing: 1.5px; color: #8A8783; text-transform: uppercase; }
  .divider { width: 100%; max-width: 420px; height: 1px; background: #2A2A2A; margin-bottom: 28px; }
  .round-label { font-size: 13px; letter-spacing: 3px; color: #8A8783; text-transform: uppercase; margin-bottom: 12px; min-height: 18px; }
  .ring-wrap { position: relative; width: 260px; height: 260px; margin-bottom: 20px; }
  #ringSvg { transform: rotate(-90deg); }
  #progressRing { transition: stroke-dashoffset 1s linear, stroke 0.3s ease; }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #countdownNum { font-size: 84px; line-height: 1; }
  #phaseLabel {
    margin-top: 8px; font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 600; text-align: center; padding: 0 20px; color: #C81E3A;
  }
  .next-label { font-size: 12px; letter-spacing: 1.5px; color: #5F5D59; text-transform: uppercase; margin-bottom: 24px; min-height: 16px; text-align: center; }
  .controls { display: flex; gap: 16px; margin-bottom: 32px; align-items: center; }
  .play-btn {
    width: 88px; height: 88px; border-radius: 50%; border: none;
    background: #C81E3A; color: #F2EFE9; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .play-btn:active { transform: scale(0.94); }
  .reset-btn {
    width: 56px; height: 56px; border-radius: 50%; border: 1px solid #3A3A3A;
    background: transparent; color: #B7B4AE; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .reset-btn:active { transform: scale(0.9); }
  .setup-toggle {
    width: 100%; max-width: 420px; padding: 10px 0; background: transparent;
    border: 1px solid #2A2A2A; color: #8A8783; font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; font-family: inherit;
  }
  #setupPanel { width: 100%; max-width: 420px; margin-top: 16px; display: none; }
  .stepper-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 4px; border-bottom: 1px solid #202020;
  }
  .stepper-row span.label { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: #B7B4AE; }
  .stepper-controls { display: flex; align-items: center; gap: 14px; }
  .stepper-btn {
    background: #1D1D1D; border: none; color: #F2EFE9; width: 30px; height: 30px;
    border-radius: 6px; cursor: pointer; font-size: 16px; line-height: 1;
  }
  .stepper-btn:active { transform: scale(0.9); }
  .stepper-val { font-size: 22px; width: 36px; text-align: center; display: inline-block; }
  .section-label { margin-top: 16px; margin-bottom: 8px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #5F5D59; }
  .ex-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 4px; border-bottom: 1px solid #1A1A1A;
  }
  .ex-row .ex-name { font-size: 14px; }
  .ex-row .ex-num { color: #5F5D59; margin-right: 8px; }
  .ex-remove { background: transparent; border: none; color: #5F5D59; cursor: pointer; font-size: 18px; }
  .add-row { display: flex; gap: 8px; margin-top: 12px; }
  #newExInput {
    flex: 1; background: #1A1A1A; border: 1px solid #2A2A2A; color: #F2EFE9;
    padding: 10px 12px; font-size: 14px; border-radius: 4px; font-family: inherit;
  }
  .add-btn {
    background: #C81E3A; border: none; color: #F2EFE9; padding: 0 16px;
    border-radius: 4px; cursor: pointer; font-size: 18px;
  }
  .done-btn {
    margin-top: 4px; background: transparent; border: 1px solid #3A3A3A; color: #B7B4AE;
    padding: 10px 24px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    border-radius: 4px; cursor: pointer; font-family: inherit; display: none;
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="title bebas">THE CORNER</div>
    <div class="subtitle" id="headerSub">2 rounds · ~9 min</div>
  </div>
  <div class="divider"></div>

  <div class="round-label" id="roundLabel"></div>

  <div class="ring-wrap">
    <svg id="ringSvg" width="260" height="260">
      <circle cx="130" cy="130" r="120" stroke="#232323" stroke-width="10" fill="none"/>
      <circle id="progressRing" cx="130" cy="130" r="120" stroke="#C81E3A" stroke-width="10" fill="none"
        stroke-linecap="round" stroke-dasharray="753.98" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <div id="countdownNum" class="bebas">30</div>
      <div id="phaseLabel">Push-ups</div>
    </div>
  </div>

  <div class="next-label" id="nextLabel">4 exercises · 30s work / 15s rest</div>

  <div class="controls">
    <button class="play-btn" id="playBtn" aria-label="Start">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="#F2EFE9" style="margin-left:3px"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="reset-btn" id="resetBtn" aria-label="Reset">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B7B4AE" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
  </div>

  <button class="setup-toggle" id="setupToggle">Edit circuit</button>

  <div id="setupPanel">
    <div class="stepper-row">
      <span class="label">Work (sec)</span>
      <div class="stepper-controls">
        <button class="stepper-btn" id="workMinus">−</button>
        <span class="stepper-val bebas" id="workVal">30</span>
        <button class="stepper-btn" id="workPlus">+</button>
      </div>
    </div>
    <div class="stepper-row">
      <span class="label">Rest (sec)</span>
      <div class="stepper-controls">
        <button class="stepper-btn" id="restMinus">−</button>
        <span class="stepper-val bebas" id="restVal">15</span>
        <button class="stepper-btn" id="restPlus">+</button>
      </div>
    </div>
    <div class="stepper-row">
      <span class="label">Rounds</span>
      <div class="stepper-controls">
        <button class="stepper-btn" id="roundsMinus">−</button>
        <span class="stepper-val bebas" id="roundsVal">2</span>
        <button class="stepper-btn" id="roundsPlus">+</button>
      </div>
    </div>

    <div class="section-label">Circuit order</div>
    <div id="exerciseList"></div>

    <div class="add-row">
      <input id="newExInput" type="text" placeholder="Add exercise">
      <button class="add-btn" id="addExBtn">+</button>
    </div>
  </div>

  <button class="done-btn" id="doneBtn">Set up next round</button>
</div>

<script>
(function() {
  var exercises = ["Push-ups", "Squats", "Plank", "Mountain climbers"];
  var workSec = 30, restSec = 15, rounds = 2;

  var running = false;
  var phase = "idle"; // idle | work | rest | done
  var exIndex = 0;
  var round = 1;
  var secondsLeft = workSec;
  var intervalId = null;
  var audioCtx = null;

  var circumference = 2 * Math.PI * 120;

  // DOM refs
  var countdownNum = document.getElementById('countdownNum');
  var phaseLabel = document.getElementById('phaseLabel');
  var roundLabel = document.getElementById('roundLabel');
  var nextLabel = document.getElementById('nextLabel');
  var headerSub = document.getElementById('headerSub');
  var progressRing = document.getElementById('progressRing');
  var playBtn = document.getElementById('playBtn');
  var resetBtn = document.getElementById('resetBtn');
  var setupToggle = document.getElementById('setupToggle');
  var setupPanel = document.getElementById('setupPanel');
  var exerciseList = document.getElementById('exerciseList');
  var newExInput = document.getElementById('newExInput');
  var addExBtn = document.getElementById('addExBtn');
  var doneBtn = document.getElementById('doneBtn');
  var workVal = document.getElementById('workVal');
  var restVal = document.getElementById('restVal');
  var roundsVal = document.getElementById('roundsVal');

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function beep(freq, dur) {
    try {
      var ctx = getAudioCtx();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + dur);
    } catch (e) {}
  }

  function bell() {
    beep(880, 0.15);
    setTimeout(function() { beep(880, 0.15); }, 180);
  }

  function tick() {
    beep(440, 0.05);
  }

  function totalWork() { return exercises.length; }

  function renderHeader() {
    var totalRoundSec = exercises.reduce(function(a) { return a + workSec; }, 0) + (totalWork() - 1) * restSec;
    var totalSec = totalRoundSec * rounds + (rounds - 1) * restSec;
    var totalMin = Math.round(totalSec / 60);
    headerSub.textContent = rounds + " round" + (rounds > 1 ? "s" : "") + " · ~" + totalMin + " min";
  }

  function renderExerciseList() {
    exerciseList.innerHTML = "";
    exercises.forEach(function(ex, i) {
      var row = document.createElement('div');
      row.className = 'ex-row';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'ex-name';
      nameSpan.innerHTML = '<span class="ex-num">' + (i + 1) + '</span>' + ex;
      var removeBtn = document.createElement('button');
      removeBtn.className = 'ex-remove';
      removeBtn.textContent = '✕';
      removeBtn.onclick = function() {
        exercises.splice(i, 1);
        renderExerciseList();
        renderHeader();
        updateIdleDisplay();
      };
      row.appendChild(nameSpan);
      row.appendChild(removeBtn);
      exerciseList.appendChild(row);
    });
  }

  function updateIdleDisplay() {
    if (phase === 'idle') {
      countdownNum.textContent = workSec;
      phaseLabel.textContent = exercises[0] || "—";
      nextLabel.textContent = exercises.length + " exercises · " + workSec + "s work / " + restSec + "s rest";
      progressRing.setAttribute('stroke-dashoffset', 0);
      progressRing.setAttribute('stroke', '#C81E3A');
    }
  }

  function render() {
    var duration = phase === 'rest' ? restSec : workSec;
    var progress = duration > 0 ? secondsLeft / duration : 0;
    var dashOffset = circumference * (1 - progress);

    if (phase === 'idle' || phase === 'done') {
      progressRing.setAttribute('stroke-dashoffset', 0);
    } else {
      progressRing.setAttribute('stroke-dashoffset', dashOffset);
    }
    progressRing.setAttribute('stroke', phase === 'rest' ? '#4A5568' : '#C81E3A');

    if (phase === 'done') {
      countdownNum.textContent = '🥊';
      phaseLabel.textContent = 'Workout complete';
      phaseLabel.style.color = '#C81E3A';
      nextLabel.textContent = '';
      roundLabel.textContent = '';
      playBtn.style.display = 'none';
      doneBtn.style.display = 'inline-block';
      return;
    }

    doneBtn.style.display = 'none';
    playBtn.style.display = 'flex';

    countdownNum.textContent = phase === 'idle' ? workSec : secondsLeft;
    countdownNum.style.color = phase === 'rest' ? '#B7B4AE' : '#F2EFE9';

    var currentLabel = phase === 'work' ? exercises[exIndex] : phase === 'rest' ? 'Rest' : (exercises[0] || '—');
    phaseLabel.textContent = currentLabel;
    phaseLabel.style.color = phase === 'rest' ? '#8A8783' : '#C81E3A';

    if (phase !== 'idle') {
      roundLabel.textContent = 'Round ' + round + ' of ' + rounds;
    } else {
      roundLabel.textContent = '';
    }

    var nl = null;
    if (phase === 'rest') {
      nl = (exIndex === totalWork() - 1) ? exercises[0] : exercises[exIndex + 1];
    } else if (phase === 'work' && exIndex < totalWork() - 1) {
      nl = exercises[exIndex + 1];
    }

    if (nl) {
      nextLabel.textContent = 'Next · ' + nl;
    } else if (phase === 'idle') {
      nextLabel.textContent = exercises.length + ' exercises · ' + workSec + 's work / ' + restSec + 's rest';
    } else {
      nextLabel.textContent = '';
    }

    playBtn.innerHTML = running
      ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="#F2EFE9"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>'
      : '<svg width="32" height="32" viewBox="0 0 24 24" fill="#F2EFE9" style="margin-left:3px"><path d="M8 5v14l11-7z"/></svg>';
  }

  function transition() {
    if (phase === 'work') {
      var isLast = exIndex === totalWork() - 1;
      if (isLast && round >= rounds) {
        bell();
        phase = 'done';
        stopRunning();
        render();
        return;
      } else {
        bell();
        phase = 'rest';
        secondsLeft = restSec;
        render();
        return;
      }
    }
    if (phase === 'rest') {
      bell();
      var isLast = exIndex === totalWork() - 1;
      if (isLast) {
        round += 1;
        exIndex = 0;
      } else {
        exIndex += 1;
      }
      phase = 'work';
      secondsLeft = workSec;
      render();
    }
  }

  function stopRunning() {
    running = false;
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
  }

  function startInterval() {
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(function() {
      if (secondsLeft <= 1) {
        secondsLeft = 0;
        render();
        transition();
      } else {
        secondsLeft -= 1;
        if (secondsLeft <= 4 && secondsLeft > 0) tick();
        render();
      }
    }, 1000);
  }

  function start() {
    if (phase === 'idle' || phase === 'done') {
      exIndex = 0;
      round = 1;
      phase = 'work';
      secondsLeft = workSec;
      phaseLabel.style.color = '';
    }
    running = true;
    bell();
    render();
    startInterval();
  }

  function pause() {
    running = false;
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
  }

  function reset() {
    stopRunning();
    phase = 'idle';
    exIndex = 0;
    round = 1;
    secondsLeft = workSec;
    render();
    updateIdleDisplay();
  }

  playBtn.addEventListener('click', function() {
    if (running) { pause(); render(); } else { start(); }
  });

  resetBtn.addEventListener('click', reset);
  doneBtn.addEventListener('click', reset);

  setupToggle.addEventListener('click', function() {
    var visible = setupPanel.style.display === 'block';
    setupPanel.style.display = visible ? 'none' : 'block';
    setupToggle.textContent = visible ? 'Edit circuit' : 'Hide setup';
  });

  document.getElementById('workMinus').addEventListener('click', function() {
    workSec = Math.max(5, workSec - 5);
    workVal.textContent = workSec;
    renderHeader();
    updateIdleDisplay();
  });
  document.getElementById('workPlus').addEventListener('click', function() {
    workSec += 5;
    workVal.textContent = workSec;
    renderHeader();
    updateIdleDisplay();
  });
  document.getElementById('restMinus').addEventListener('click', function() {
    restSec = Math.max(0, restSec - 5);
    restVal.textContent = restSec;
    renderHeader();
    updateIdleDisplay();
  });
  document.getElementById('restPlus').addEventListener('click', function() {
    restSec += 5;
    restVal.textContent = restSec;
    renderHeader();
    updateIdleDisplay();
  });
  document.getElementById('roundsMinus').addEventListener('click', function() {
    rounds = Math.max(1, rounds - 1);
    roundsVal.textContent = rounds;
    renderHeader();
  });
  document.getElementById('roundsPlus').addEventListener('click', function() {
    rounds += 1;
    roundsVal.textContent = rounds;
    renderHeader();
  });

  addExBtn.addEventListener('click', function() {
    var val = newExInput.value.trim();
    if (val) {
      exercises.push(val);
      newExInput.value = '';
      renderExerciseList();
      renderHeader();
      updateIdleDisplay();
    }
  });
  newExInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addExBtn.click();
  });

  // init
  renderExerciseList();
  renderHeader();
  render();
})();
</script>

</body>
</html>
